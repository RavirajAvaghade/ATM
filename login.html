<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATM Login</title>

<style>
body {
    background: #2c2c2c;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ATM box */
.atm {
    background: linear-gradient(#aaa, #666);
    padding: 25px;
    border-radius: 15px;
    width: 420px;
    box-shadow: 0 0 25px black;
}

/* Screen */
.screen {
    background: black;
    color: lime;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    box-shadow: inset 0 0 10px lime;
}

.screen h3 {
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
    background: black;
    color: lime;
    border: 1px solid lime;
    outline: none;
    font-size: 16px;
    text-align: center;
}

/* Submit button */
.submit-btn {
    padding: 10px 20px;
    background: green;
    color: white;
    border: none;
    border-radius: 5px;
    margin-top: 10px;
}

/* keypad */
.keypad {
    margin-top: 20px;
    text-align: center;
}

.keypad button {
    width: 70px;
    height: 50px;
    margin: 5px;
    font-size: 18px;
    border-radius: 5px;
}

.cancel { background: red; color: white; }
.clear { background: orange; }
.enter { background: green; color: white; }
</style>

</head>

<body>

<div class="atm">

    <div class="screen">
        <h3>ENTER CARD DETAILS</h3>

        <form action="Login" method="post">
            <input type="text" id="card" name="cardnumber" placeholder="Card Number"><br>
            <input type="password" id="pin" name="pin" placeholder="PIN"><br>

            <button class="submit-btn">Submit</button>
        </form>
    </div>

    <!-- KEYPAD -->
    <div class="keypad">
        <div>
            <button onclick="press(1)">1</button>
            <button onclick="press(2)">2</button>
            <button onclick="press(3)">3</button>
        </div>
        <div>
            <button onclick="press(4)">4</button>
            <button onclick="press(5)">5</button>
            <button onclick="press(6)">6</button>
        </div>
        <div>
            <button onclick="press(7)">7</button>
            <button onclick="press(8)">8</button>
            <button onclick="press(9)">9</button>
        </div>
        <div>
            <button class="clear" onclick="clearInput()">Clear</button>
            <button onclick="press(0)">0</button>
            <button class="enter" onclick="submitForm()">Enter</button>
        </div>
        <div>
            <button class="cancel" onclick="cancel()">Cancel</button>
        </div>
    </div>

</div>

<script>
let activeField = "card";

document.getElementById("card").focus();

document.getElementById("card").onclick = () => activeField = "card";
document.getElementById("pin").onclick = () => activeField = "pin";

function press(num) {
    let field = document.getElementById(activeField);
    field.value += num;
}

function clearInput() {
    document.getElementById(activeField).value = "";
}

function cancel() {
    document.getElementById("card").value = "";
    document.getElementById("pin").value = "";
    alert("Cancelled ❌");
}

function submitForm() {
    document.querySelector("form").submit();
}
</script>

</body>
</html>
