<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ATM Home</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #2c2c2c;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ATM body */
.atm {
    background: linear-gradient(#bbb, #777);
    padding: 30px;
    border-radius: 15px;
    width: 420px;
    box-shadow: 0 0 25px black;
}

/* Screen */
.screen {
    background: #f5f5f5;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
}

/* Headings */
h2 {
    margin: 10px 0;
    color: #333;
}

h3 {
    color: #666;
}

/* Buttons */
.btn {
    display: block;
    width: 80%;
    margin: 15px auto;
    padding: 15px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
    background: #e64a19;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #ff5722;
    transform: scale(1.05);
}

/* ATM bottom slot */
.slot {
    margin-top: 20px;
    height: 40px;
    background: black;
    border-radius: 5px;
    box-shadow: inset 0 0 10px lime;
    color: lime;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="atm">

    <div class="screen">
        <h2>💳 Welcome to ATM</h2>
        <h3>Select Your Account Type</h3>

        <a href="current.html" class="btn">Current Account</a>
        <a href="saving.html" class="btn">Saving Account</a>
    </div>

    <div class="slot">
        INSERT CARD
    </div>

</div>

</body>
</html>
